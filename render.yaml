# ──────────────────────────────────────────────────────────────
#  SmartStock Enterprise – Render.com Blueprint
#  Docs: https://render.com/docs/blueprint-spec
# ──────────────────────────────────────────────────────────────
services:
  - type: web
    name: smartstock-enterprise-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore        # closest to ap-south-1 (Mumbai Supabase)

    # Health check
    healthCheckPath: /api/health

    # Environment variables
    # NOTE: DB_PASSWORD must be set manually in Render Dashboard → Environment
    envVars:
      - key: DB_HOST
        value: aws-1-ap-south-1.pooler.supabase.com
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres.iucuspicdbqutdphfamc
      - key: DB_PASSWORD
        sync: false          # Set manually in Render Dashboard (keep secret!)
      - key: SERVER_PORT
        value: "8080"
