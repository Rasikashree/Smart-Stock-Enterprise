<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStock API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #d32f2f; }
        button { background: #d32f2f; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #b71c1c; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 4px; white-space: pre-wrap; }
        .success { border-left: 4px solid #4caf50; }
        .error { border-left: 4px solid #f44336; }
        .log { font-size: 12px; color: #666; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 SmartStock API Test</h1>
        <p>Test backend connectivity and API responses</p>
        
        <h3>1. Health Check</h3>
        <button onclick="testHealth()">Test Health API</button>
        <div id="health-result" class="result"></div>
        
        <h3>2. OTP Authentication</h3>
        <input type="text" id="phone" value="9442290033" placeholder="Phone Number" style="padding: 10px; width: 200px;">
        <button onclick="testOTPSend()">Send OTP</button>
        <button onclick="testOTPVerify()">Verify OTP (123456)</button>
        <div id="otp-result" class="result"></div>
        
        <h3>3. Products API</h3>
        <button onclick="testProducts()">Get All Products</button>
        <button onclick="testProductsByCategory()">Get Vegetables Only</button>
        <div id="products-result" class="result"></div>
        
        <h3>Console Log</h3>
        <div id="console-log"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        
        function log(message, type = 'log') {
            const logDiv = document.getElementById('console-log');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = 'log';
            logEntry.textContent = `[${timestamp}] ${message}`;
            logDiv.insertBefore(logEntry, logDiv.firstChild);
            console.log(message);
        }
        
        async function testHealth() {
            const result = document.getElementById('health-result');
            result.textContent = 'Testing...';
            result.className = 'result';
            
            try {
                log('Calling /api/health...');
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                result.className = 'result success';
                result.textContent = JSON.stringify(data, null, 2);
                log(`✅ Health check successful: ${data.status}`);
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
                log(`❌ Health check failed: ${error.message}`);
            }
        }
        
        async function testOTPSend() {
            const result = document.getElementById('otp-result');
            const phone = document.getElementById('phone').value;
            result.textContent = 'Sending OTP...';
            result.className = 'result';
            
            try {
                log(`Sending OTP to ${phone}...`);
                const response = await fetch(`${API_BASE}/otp/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.className = 'result success';
                    result.textContent = JSON.stringify(data, null, 2);
                    log(`✅ OTP sent successfully: ${data.message}`);
                } else {
                    result.className = 'result error';
                    result.textContent = 'Failed: ' + JSON.stringify(data, null, 2);
                    log(`❌ OTP send failed: ${response.status}`);
                }
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
                log(`❌ OTP send error: ${error.message}`);
            }
        }
        
        async function testOTPVerify() {
            const result = document.getElementById('otp-result');
            const phone = document.getElementById('phone').value;
            result.textContent = 'Verifying OTP...';
            result.className = 'result';
            
            try {
                log(`Verifying OTP for ${phone}...`);
                const response = await fetch(`${API_BASE}/otp/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, otp: '123456' })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.className = 'result success';
                    result.textContent = JSON.stringify(data, null, 2);
                    log(`✅ OTP verified successfully, token received`);
                } else {
                    result.className = 'result error';
                    result.textContent = 'Failed: ' + JSON.stringify(data, null, 2);
                    log(`❌ OTP verify failed: ${response.status}`);
                }
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
                log(`❌ OTP verify error: ${error.message}`);
            }
        }
        
        async function testProducts() {
            const result = document.getElementById('products-result');
            result.textContent = 'Loading products...';
            result.className = 'result';
            
            try {
                log('Fetching all products...');
                const response = await fetch(`${API_BASE}/products`);
                const data = await response.json();
                
                result.className = 'result success';
                result.textContent = `Total Products: ${data.length}\n\n` + 
                    data.slice(0, 5).map(p => `${p.name} - ₹${p.price} (Stock: ${p.stock})`).join('\n') +
                    '\n... and more';
                log(`✅ Loaded ${data.length} products`);
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
                log(`❌ Products fetch error: ${error.message}`);
            }
        }
        
        async function testProductsByCategory() {
            const result = document.getElementById('products-result');
            result.textContent = 'Loading vegetables...';
            result.className = 'result';
            
            try {
                log('Fetching vegetables...');
                const response = await fetch(`${API_BASE}/products?category=Vegetables`);
                const data = await response.json();
                
                result.className = 'result success';
                result.textContent = `Vegetables: ${data.length}\n\n` + 
                    data.map(p => `${p.name} - ₹${p.price}`).join('\n');
                log(`✅ Loaded ${data.length} vegetables`);
            } catch (error) {
                result.className = 'result error';
                result.textContent = 'Error: ' + error.message;
                log(`❌ Vegetables fetch error: ${error.message}`);
            }
        }
        
        // Auto-run health check on load
        window.onload = () => {
            log('API Test Page loaded');
            testHealth();
        };
    </script>
</body>
</html>
